url: https://paulesantos.github.io/fuzzystring/
home:
  title: Fast Fuzzy String Joins for Data Frames
  description: |
    Perform fuzzy joins on data frames using approximate string matching.
    Implements inner, left, right, full, semi, and anti joins with
    'stringdist' metrics and a 'data.table' backend plus compiled C++
    result assembly. Adaptive candidate planning helps reduce unnecessary
    distance evaluations in single-column joins.
  badges:
  - text: 'CRAN status'
    href: 'https://CRAN.R-project.org/package=fuzzystring'
    src: 'https://www.r-pkg.org/badges/version/fuzzystring'
  - text: 'R-CMD-check'
    href: 'https://github.com/PaulESantos/fuzzystring/actions/workflows/R-CMD-check.yaml'
    src: 'https://github.com/PaulESantos/fuzzystring/actions/workflows/R-CMD-check.yaml/badge.svg'
  - text: 'Lifecycle: stable'
    href: 'https://lifecycle.r-lib.org/articles/stages.html'
    src: 'https://img.shields.io/badge/lifecycle-stable-blue.svg'
  - text: 'Total downloads'
    href: 'https://cran.r-project.org/package=fuzzystring'
    src: 'http://cranlogs.r-pkg.org/badges/grand-total/fuzzystring?color=blue'
  - text: 'Last week downloads'
    href: 'https://cran.r-project.org/package=fuzzystring'
    src: 'http://cranlogs.r-pkg.org/badges/last-week/fuzzystring?color=blue'
authors:
  Paul E. Santos Andrade:
    href: https://paulefrensa.rbind.io/
