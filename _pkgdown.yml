    bg: '#FEFDF9'
    fg: '#1A1A1A'
    primary: '#355E3B'
    secondary: '#C9A66B'
    link-color: '#2F5F8F'
    info: '#A3C2AD'
    headings-color: '#4A3B2F'
    navbar-bg: '#FEFDF9'
    navbar-light-color: '#355E3B'
    navbar-light-hover-color: '#2F5F8F'
opengraph:
